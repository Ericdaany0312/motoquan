<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E8551A"/>
    </linearGradient>
  </defs>

  <!-- Logo Mark: stylized wheel + rider circle -->
  <g transform="translate(6, 6)">
    <!-- Outer ring -->
    <circle cx="24" cy="24" r="22" fill="none" stroke="url(#markGrad)" stroke-width="3.5"/>
    <!-- Inner spoke ring -->
    <circle cx="24" cy="24" r="13" fill="none" stroke="url(#markGrad)" stroke-width="2.5"/>
    <!-- Center dot -->
    <circle cx="24" cy="24" r="4" fill="#FF6B35"/>
    <!-- Spokes (6, like a wheel) -->
    <line x1="24" y1="11" x2="24" y2="2" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="24" y1="37" x2="24" y2="46" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="11" y1="24" x2="2" y2="24" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="37" y1="24" x2="46" y2="24" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="15.7" y1="15.7" x2="9.3" y2="9.3" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32.3" y1="32.3" x2="38.7" y2="38.7" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32.3" y1="15.7" x2="38.7" y2="9.3" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="15.7" y1="32.3" x2="9.3" y2="38.7" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Text: 摩托圈 -->
  <text x="70" y="30" font-family="'PingFang SC', 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="26" font-weight="700" fill="#1A1A2E" letter-spacing="1">摩托圈</text>
  <text x="70" y="47" font-family="'PingFang SC', 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="11" font-weight="500" fill="#9CA3AF" letter-spacing="4">MOTORCYCLE CIRCLE</text>
</svg>
